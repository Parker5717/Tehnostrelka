<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASPER — Профиль</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height: 100vh; overflow-y: auto; padding: 0 0 48px; display: block; }

    #top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    #top-bar h1 { font-size: 16px; font-weight: 700; flex: 1; }

    .section { padding: 20px 16px 0; }
    .section-title {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--accent); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 12px;
    }

    /* Hero карточка профиля */
    #profile-hero {
      margin: 16px;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--border-bright);
      background: linear-gradient(135deg, rgba(0,170,255,0.08), rgba(0,255,136,0.04));
      display: flex; align-items: center; gap: 16px;
    }
    #hero-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #0055aa, #00aaff);
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: white;
      flex-shrink: 0;
    }
    #hero-info { flex: 1; min-width: 0; }
    #hero-name  { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    #hero-level { font-size: 13px; color: var(--accent); font-family: var(--font-mono); margin-bottom: 8px; }
    #hero-xp-bar { margin-bottom: 4px; }
    #hero-xp-text { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }

    /* Статы */
    #stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .stat-card {
      padding: 14px 12px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-glass);
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 900; color: var(--text-primary); }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; line-height: 1.3; }

    /* Лидерборд */
    #leaderboard-list { display: flex; flex-direction: column; gap: 8px; }

    .lb-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-glass);
    }
    .lb-item.me    { border-color: var(--accent); background: rgba(0,170,255,0.06); }
    .lb-item.gold  { border-color: #ffd700; }
    .lb-item.silver{ border-color: #c0c0c0; }
    .lb-item.bronze{ border-color: #cd7f32; }

    .lb-rank  { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
    .lb-avatar{
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-glow); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .lb-info  { flex: 1; min-width: 0; }
    .lb-name  { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .lb-level { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
    .lb-xp    { font-size: 13px; font-weight: 700; color: var(--success); font-family: var(--font-mono); }

    /* Ачивки */
    #ach-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .ach-card {
      padding: 12px 8px; border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      opacity: 0.4;
    }
    .ach-card.unlocked { opacity: 1; border-color: var(--border-bright); background: var(--bg-glass); }
    .ach-icon  { font-size: 28px; margin-bottom: 6px; }
    .ach-title { font-size: 11px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .ach-xp    { font-size: 10px; color: var(--success); font-family: var(--font-mono); margin-top: 3px; }
  </style>
</head>
<body>

<div id="top-bar">
  <button class="btn" onclick="window.location.href='/app'" style="padding:8px 14px;font-size:13px">← Назад</button>
  <h1>👤 Мой профиль</h1>
</div>

<!-- Hero -->
<div id="profile-hero">
  <div id="hero-avatar">?</div>
  <div id="hero-info">
    <div id="hero-name">Загрузка...</div>
    <div id="hero-level">LVL 1 · Стажёр</div>
    <div id="hero-xp-bar" class="xp-bar-wrap">
      <div id="hero-xp-fill" class="xp-bar-fill" style="width:0%"></div>
    </div>
    <div id="hero-xp-text">0 XP</div>
  </div>
</div>

<!-- Статистика -->
<div class="section">
  <div class="section-title">📊 Статистика</div>
  <div id="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-quests">—</div>
      <div class="stat-label">Квестов выполнено</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-scans">—</div>
      <div class="stat-label">Сканирований</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-achs">—</div>
      <div class="stat-label">Достижений</div>
    </div>
  </div>
</div>

<!-- Достижения -->
<div class="section" style="margin-top:20px">
  <div class="section-title">🏆 Достижения</div>
  <div id="ach-grid">
    <!-- Заполняется JS -->
  </div>
</div>

<!-- Лидерборд -->
<div class="section" style="margin-top:20px">
  <div class="section-title">🥇 Лидерборд</div>
  <div id="leaderboard-list">
    <!-- Заполняется JS -->
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  if (!API.hasToken()) window.location.href = '/';

  const ICONS = { eye:'👁', shield:'🛡', zap:'⚡', map:'🗺', star:'⭐', trophy:'🏆' };
  const RANK_ICONS = ['🥇','🥈','🥉'];
  const RANK_CLASSES = ['gold','silver','bronze'];

  let _myUsername = '';

  async function load() {
    // Профиль
    const profile = await API.getProfile();
    _myUsername = profile.username;

    document.getElementById('hero-avatar').textContent  = profile.display_name.charAt(0).toUpperCase();
    document.getElementById('hero-name').textContent    = profile.display_name;
    document.getElementById('hero-level').textContent   = `LVL ${profile.level} · ${profile.level_title}`;
    document.getElementById('hero-xp-fill').style.width = `${Math.round(profile.level_progress_pct * 100)}%`;
    document.getElementById('hero-xp-text').textContent = `${profile.total_xp} XP · ещё ${profile.xp_to_next_level} до уровня ${profile.level + 1}`;

    // Статистика
    const stats = await API.get('/api/progress/stats');
    document.getElementById('stat-quests').textContent = stats.quests_completed;
    document.getElementById('stat-scans').textContent  = stats.scans_total;
    document.getElementById('stat-achs').textContent   = stats.achievements_unlocked;

    // Ачивки
    const achs = await API.get('/api/progress/achievements');
    const achGrid = document.getElementById('ach-grid');
    achGrid.innerHTML = '';
    achs.forEach(a => {
      const card = document.createElement('div');
      card.className = `ach-card${a.unlocked ? ' unlocked' : ''}`;
      card.innerHTML = `
        <div class="ach-icon">${ICONS[a.icon] || '🏆'}</div>
        <div class="ach-title">${a.title}</div>
        ${a.xp_bonus ? `<div class="ach-xp">+${a.xp_bonus} XP</div>` : ''}
      `;
      card.title = a.description;
      achGrid.appendChild(card);
    });

    // Лидерборд
    const lb = await API.getLeaderboard();
    const lbList = document.getElementById('leaderboard-list');
    lbList.innerHTML = '';
    lb.forEach((u, i) => {
      const isMe = u.username === _myUsername;
      const item = document.createElement('div');
      item.className = `lb-item${isMe ? ' me' : ''}${i < 3 ? ` ${RANK_CLASSES[i]}` : ''}`;
      item.innerHTML = `
        <div class="lb-rank">${i < 3 ? RANK_ICONS[i] : `#${i+1}`}</div>
        <div class="lb-avatar">${u.display_name.charAt(0).toUpperCase()}</div>
        <div class="lb-info">
          <div class="lb-name">${u.display_name}${isMe ? ' (ты)' : ''}</div>
          <div class="lb-level">LVL ${u.level} · ${u.level_title}</div>
        </div>
        <div class="lb-xp">${u.total_xp} XP</div>
      `;
      lbList.appendChild(item);
    });

    if (lb.length === 0) {
      lbList.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px;font-size:14px">Пока никого нет. Будь первым! 🚀</div>';
    }
  }

  load().catch(console.error);
</script>
</body>
</html>

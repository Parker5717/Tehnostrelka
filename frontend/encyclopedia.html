<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASPER — Энциклопедия</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height: 100vh; overflow-y: auto; padding: 0 0 48px; display: block; }

    #top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    #top-bar h1 { font-size: 16px; font-weight: 700; flex: 1; }

    .section { padding: 16px 16px 0; }
    .section-title {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--accent); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 12px;
    }

    #search-wrap {
      padding: 12px 16px;
      position: sticky; top: 53px; z-index: 9;
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
    }
    #search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-main);
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text-dim); }

    #objects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
    }

    .obj-card {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-glass);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }
    .obj-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .obj-card.locked { opacity: 0.35; cursor: default; }
    .obj-card.locked:hover { transform: none; border-color: var(--border); }

    .obj-icon {
      font-size: 40px;
      text-align: center;
      padding: 20px 0 12px;
      background: rgba(0,170,255,0.04);
    }
    .obj-body { padding: 10px 12px 14px; }
    .obj-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .obj-marker {
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-dim); margin-bottom: 6px;
    }
    .obj-status {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      display: inline-block;
    }
    .obj-status.found    { background: rgba(0,255,136,0.12); color: var(--success); }
    .obj-status.notfound { background: rgba(68,85,102,0.2);  color: var(--locked); }

    /* Модалка детали объекта */
    #detail-modal {
      position: fixed; inset: 0;
      background: rgba(7,11,20,0.85);
      backdrop-filter: blur(6px);
      z-index: 50;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #detail-modal.open { opacity: 1; pointer-events: all; }
    #detail-inner {
      width: 100%; max-height: 85vh;
      background: var(--bg-dark);
      border-top: 1px solid var(--border-bright);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    #detail-modal.open #detail-inner { transform: translateY(0); }

    #detail-icon  { font-size: 56px; text-align: center; margin-bottom: 12px; }
    #detail-name  { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    #detail-badge { text-align: center; margin-bottom: 16px; }
    #detail-desc  {
      font-size: 14px; color: var(--text-secondary);
      line-height: 1.7; margin-bottom: 16px;
    }

    .detail-section { margin-bottom: 14px; }
    .detail-section h4 {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--accent); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .detail-rule {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 12px; border-radius: 8px;
      background: var(--bg-glass); margin-bottom: 6px;
      font-size: 13px; color: var(--text-primary); line-height: 1.5;
    }
    .detail-rule .rule-icon { flex-shrink: 0; font-size: 16px; }

    #detail-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--text-secondary); font-size: 22px; cursor: pointer;
    }

    #empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text-secondary);
    }
    #empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div id="top-bar">
  <button class="btn" onclick="window.location.href='/app'" style="padding:8px 14px;font-size:13px">← Назад</button>
  <h1>📖 Энциклопедия цеха</h1>
</div>

<div id="search-wrap">
  <input id="search-input" type="text" placeholder="🔍 Поиск по названию...">
</div>

<div id="objects-grid"></div>
<div id="empty-state" class="hidden">
  <div class="icon">🔍</div>
  <div>Ничего не найдено</div>
</div>

<!-- Модалка детали -->
<div id="detail-modal">
  <div id="detail-inner" style="position:relative">
    <button id="detail-close">✕</button>
    <div id="detail-icon">❓</div>
    <div id="detail-name">Объект</div>
    <div id="detail-badge"></div>
    <div id="detail-desc"></div>
    <div id="detail-sections"></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
if (!API.hasToken()) window.location.href = '/';

// База знаний объектов
const OBJECTS_DB = [
  {
    id: 'marker_0',
    icon: '🚪',
    name: 'Входная зона',
    marker: 'ArUco ID: 0',
    desc: 'Контрольная точка входа в производственный цех. Каждый сотрудник проходит через неё в начале и конце смены.',
    rules: [
      { icon: '✅', text: 'Всегда носи бейдж при входе в цех' },
      { icon: '✅', text: 'Проверь наличие СИЗ перед входом' },
      { icon: '🚫', text: 'Не пропускай посторонних без сопровождения' },
    ],
    facts: ['Входная зона оборудована системой контроля доступа', 'При пожарной тревоге — сбор у входной зоны'],
  },
  {
    id: 'marker_1',
    icon: '🛑',
    name: 'Кнопка аварийного стопа',
    marker: 'ArUco ID: 1',
    desc: 'Красная кнопка экстренной остановки всего оборудования в зоне. Используется только в аварийных ситуациях.',
    rules: [
      { icon: '🚨', text: 'Нажать при угрозе жизни или серьёзной неисправности' },
      { icon: '🚫', text: 'Не нажимать в тестовых целях без разрешения мастера' },
      { icon: '✅', text: 'Знай расположение ближайшей кнопки стопа' },
    ],
    facts: ['Остановка происходит в течение 0.5 секунды', 'После нажатия — оборудование не запустить без ключа мастера'],
  },
  {
    id: 'marker_2',
    icon: '⚙️',
    name: 'Рабочий станок',
    marker: 'ArUco ID: 2',
    desc: 'Основное производственное оборудование рабочего места. Требует обязательного инструктажа перед работой.',
    rules: [
      { icon: '✅', text: 'Пройди инструктаж перед первым включением' },
      { icon: '✅', text: 'Проверь защитные ограждения перед запуском' },
      { icon: '🚫', text: 'Не оставляй работающий станок без присмотра' },
      { icon: '🚫', text: 'Не надевай перчатки при работе с вращающимися частями' },
    ],
    facts: ['Паспорт оборудования находится у мастера', 'Плановое ТО проводится каждые 500 часов работы'],
  },
  {
    id: 'marker_3',
    icon: '🔧',
    name: 'Зона хранения инструмента',
    marker: 'ArUco ID: 3',
    desc: 'Место хранения ручного и измерительного инструмента. Каждый инструмент имеет своё место.',
    rules: [
      { icon: '✅', text: 'Возвращай инструмент после использования' },
      { icon: '✅', text: 'Сообщай о поломке или потере инструмента' },
      { icon: '🚫', text: 'Не выноси инструмент за пределы цеха' },
    ],
    facts: ['Инвентаризация проводится еженедельно', 'При обнаружении чужого инструмента — сообщи мастеру'],
  },
  {
    id: 'marker_4',
    icon: '🧯',
    name: 'Огнетушитель',
    marker: 'ArUco ID: 4',
    desc: 'Первичное средство пожаротушения. Порошковый огнетушитель ОП-5 для тушения любых видов возгораний.',
    rules: [
      { icon: '🚨', text: 'При возгорании — сначала эвакуируй людей, потом туши' },
      { icon: '✅', text: 'Направляй струю к основанию огня' },
      { icon: '✅', text: 'После использования — сообщи о замене' },
      { icon: '🚫', text: 'Не загораживай доступ к огнетушителю' },
    ],
    facts: ['Проверка раз в год', 'Дальность струи — до 3 метров', 'Время работы — 8-10 секунд'],
  },
  {
    id: 'ppe_helmet',
    icon: '⛑',
    name: 'Защитная каска',
    marker: 'ArUco ID: 10 (Safety Check)',
    desc: 'Средство защиты головы от ударов и падающих предметов. Обязательна во всех производственных зонах.',
    rules: [
      { icon: '✅', text: 'Надевай перед входом в производственную зону' },
      { icon: '✅', text: 'Проверяй целостность перед каждой сменой' },
      { icon: '🚫', text: 'Не носи каску задом наперёд' },
      { icon: '🚫', text: 'Не используй повреждённую каску' },
    ],
    facts: ['Срок службы — 5 лет', 'Защита от удара до 5 кДж', 'Маркируй каску своим именем'],
  },
  {
    id: 'ppe_vest',
    icon: '🦺',
    name: 'Сигнальный жилет',
    marker: 'ArUco ID: 11 (Safety Check)',
    desc: 'Сигнальная одежда повышенной видимости. Делает сотрудника заметным в условиях недостаточного освещения.',
    rules: [
      { icon: '✅', text: 'Носи поверх рабочей одежды' },
      { icon: '✅', text: 'Стирай при загрязнении — грязный жилет теряет видимость' },
      { icon: '🚫', text: 'Не закрывай световозвращающие полосы' },
    ],
    facts: ['Класс защиты 2 — видимость до 100 метров', 'Соответствует ГОСТ 12.4.281-2014'],
  },
];

let _scannedIds = new Set();
let _filteredObjects = [...OBJECTS_DB];

async function loadScanned() {
  try {
    const stats = await API.get('/api/progress/scanned_objects');
    _scannedIds = new Set(stats.scanned || []);
  } catch (e) {
    // Если эндпоинт ещё нет — считаем все незнакомыми
    _scannedIds = new Set();
  }
  renderGrid(_filteredObjects);
}

function renderGrid(objects) {
  const grid = document.getElementById('objects-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';

  if (objects.length === 0) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  objects.forEach(obj => {
    const found = _scannedIds.has(obj.id) || true; // показываем все, locked = не найдены
    const card = document.createElement('div');
    card.className = `obj-card${found ? '' : ' locked'}`;
    card.innerHTML = `
      <div class="obj-icon">${obj.icon}</div>
      <div class="obj-body">
        <div class="obj-name">${obj.name}</div>
        <div class="obj-marker">${obj.marker}</div>
        <span class="obj-status ${found ? 'found' : 'notfound'}">
          ${found ? '✅ Изучен' : '🔒 Не найден'}
        </span>
      </div>
    `;
    if (found) {
      card.addEventListener('click', () => openDetail(obj));
    }
    grid.appendChild(card);
  });
}

function openDetail(obj) {
  document.getElementById('detail-icon').textContent = obj.icon;
  document.getElementById('detail-name').textContent = obj.name;
  document.getElementById('detail-badge').innerHTML = `
    <span class="obj-status found">✅ Изучен</span>
    <span style="font-size:11px;color:var(--text-dim);margin-left:8px;font-family:var(--font-mono)">${obj.marker}</span>
  `;
  document.getElementById('detail-desc').textContent = obj.desc;

  const sections = document.getElementById('detail-sections');
  sections.innerHTML = '';

  // Правила
  if (obj.rules?.length) {
    const s = document.createElement('div');
    s.className = 'detail-section';
    s.innerHTML = `<h4>📋 Правила безопасности</h4>`;
    obj.rules.forEach(r => {
      const row = document.createElement('div');
      row.className = 'detail-rule';
      row.innerHTML = `<span class="rule-icon">${r.icon}</span><span>${r.text}</span>`;
      s.appendChild(row);
    });
    sections.appendChild(s);
  }

  // Факты
  if (obj.facts?.length) {
    const s = document.createElement('div');
    s.className = 'detail-section';
    s.innerHTML = `<h4>💡 Интересные факты</h4>`;
    obj.facts.forEach(f => {
      const row = document.createElement('div');
      row.className = 'detail-rule';
      row.innerHTML = `<span class="rule-icon">📌</span><span>${f}</span>`;
      s.appendChild(row);
    });
    sections.appendChild(s);
  }

  const modal = document.getElementById('detail-modal');
  modal.style.opacity = '1';
  modal.style.pointerEvents = 'all';
  document.getElementById('detail-inner').style.transform = 'translateY(0)';
}

function closeDetail() {
  const modal = document.getElementById('detail-modal');
  modal.style.opacity = '0';
  modal.style.pointerEvents = 'none';
  document.getElementById('detail-inner').style.transform = 'translateY(100%)';
}

// Поиск
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  _filteredObjects = OBJECTS_DB.filter(o =>
    o.name.toLowerCase().includes(q) || o.desc.toLowerCase().includes(q)
  );
  renderGrid(_filteredObjects);
});

// Закрытие модалки
document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-modal')) closeDetail();
});

loadScanned().then(() => {
  const params = new URLSearchParams(window.location.search);
  const targetObjId = params.get("obj");
  if (targetObjId) {
    const obj = OBJECTS_DB.find(o => o.id === targetObjId);
    if (obj) setTimeout(() => openDetail(obj), 300);
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CASPER AR</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/hud.css">
</head>
<body>

<!-- ============================================================
     КАМЕРА + AR ОВЕРЛЕЙ
     ============================================================ -->
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="ar-canvas"></canvas>

  <!-- Ошибка камеры -->
  <div id="camera-error" class="hidden">
    <div class="icon">📷</div>
    <h3>Нет доступа к камере</h3>
    <p>Разреши доступ к камере в настройках браузера и попробуй снова.</p>
    <button class="btn btn-primary" id="btn-retry-camera" style="margin-top:16px">
      Попробовать снова
    </button>
  </div>
</div>

<!-- ============================================================
     HUD — ВЕРХНЯЯ ПАНЕЛЬ (профиль + XP)
     ============================================================ -->
<div id="hud-top">
  <div id="hud-avatar">?</div>
  <div id="hud-profile">
    <div id="hud-level-label">LVL 1 · Стажёр</div>
    <div id="hud-username">Загрузка...</div>
    <div id="hud-xp-bar" class="xp-bar-wrap">
      <div id="hud-xp-fill" class="xp-bar-fill" style="width:0%"></div>
    </div>
    <div id="hud-xp-text">0 XP</div>
  </div>
</div>

<!-- ============================================================
     HUD — КНОПКИ СПРАВА
     ============================================================ -->
<div id="hud-controls">
  <!-- Переключение камеры -->
  <button class="hud-btn" id="btn-toggle-camera" title="Переключить камеру">🔄</button>
  <!-- Список квестов -->
  <button class="hud-btn" id="btn-quests" title="Квесты">🎯</button>
  <!-- Ачивки -->
  <button class="hud-btn" id="btn-achievements" title="Достижения">🏆</button>
  <!-- Энциклопедия -->
  <button class="hud-btn" title="Энциклопедия" onclick="window.location.href='/encyclopedia'" style="color:#aa88ff">📖</button>
  <!-- Профиль -->
  <button class="hud-btn" id="btn-profile" title="Профиль" onclick="window.location.href='/profile'" style="color:var(--success)">👤</button>
  <!-- Выход -->
  <button class="hud-btn" id="btn-logout" title="Выйти" style="color:var(--danger)">🚪</button>
</div>

<!-- ============================================================
     HUD — НИЖНЯЯ ПАНЕЛЬ (активный квест)
     ============================================================ -->
<div id="hud-bottom">
  <!-- Карточка активного квеста -->
  <div id="active-quest-card">
    <div id="quest-card-label">🔍 АКТИВНЫЙ КВЕСТ</div>
    <div id="quest-card-title">Загрузка...</div>
    <div id="quest-card-desc"></div>
    <div id="quest-card-xp"></div>
  </div>
  <!-- Если нет активного квеста -->
  <div id="no-active-quest" class="hidden">
    Нет активного квеста.
    <span onclick="QuestEngine.openModal()">Выбрать →</span>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА — СПИСОК КВЕСТОВ
     ============================================================ -->
<div id="quest-modal">
  <div id="quest-modal-inner">
    <div id="quest-modal-header">
      <span id="quest-modal-title">🎯 Квесты</span>
      <button class="btn" id="btn-close-modal" style="padding:6px 14px;font-size:13px">
        Закрыть
      </button>
    </div>
    <div id="quest-list" class="scroll-y" style="max-height:60vh;padding-right:4px">
      <!-- Заполняется quest-engine.js -->
    </div>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА — АЧИВКИ
     ============================================================ -->
<div id="achievements-modal" style="
  position:fixed;inset:0;
  background:rgba(7,11,20,0.7);
  backdrop-filter:blur(4px);
  z-index:50;display:flex;
  align-items:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s;
">
  <div style="
    width:100%;max-height:80vh;
    background:var(--bg-dark);
    border-top:1px solid var(--border-bright);
    border-radius:20px 20px 0 0;
    padding:16px 16px 32px;
    transform:translateY(100%);
    transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  " id="achievements-modal-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
      <span style="font-size:17px;font-weight:700">🏆 Достижения</span>
      <button class="btn" id="btn-close-achievements" style="padding:6px 14px;font-size:13px">Закрыть</button>
    </div>
    <div id="achievements-list" class="scroll-y" style="max-height:60vh;padding-right:4px"></div>
  </div>
</div>

<!-- ============================================================
     ВСПЛЫВАЮЩИЕ УВЕДОМЛЕНИЯ
     ============================================================ -->
<div id="xp-popup" class="xp-popup">+50 XP</div>

<div id="levelup-popup">
  <div id="levelup-inner">
    <h2>🎉</h2>
    <p id="levelup-level">Уровень 2!</p>
    <small id="levelup-title">Помощник оператора</small>
  </div>
</div>

<!-- ============================================================
     СКРИПТЫ
     ============================================================ -->
<script src="/static/js/api.js"></script>
<script src="/static/js/camera.js"></script>
<script src="/static/js/ar-overlay.js"></script>
<script src="/static/js/xp-bar.js"></script>
<script src="/static/js/achievements.js"></script>
<script src="/static/js/speedrun.js"></script>
<script src="/static/js/quiz.js"></script>
<script src="/static/js/quest-engine.js"></script>
<script src="/static/js/vision-client.js"></script>
<script src="/static/js/mascot.js"></script>
<script src="/static/js/onboarding.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
